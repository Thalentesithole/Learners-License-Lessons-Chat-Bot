<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learner Chatbot</title>

<link rel="stylesheet" href="../static/style.css">
</head>

<body>

<div class="chat-wrapper">

    <div class="chat-header">
        🚗 Learner’s License AI Assistant
    </div>

    <div class="chat-box" id="chatBox">
        <div class="msg bot">
            👋 Hi! Ask me anything about learner’s license rules, signs, or road safety.
        </div>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your question...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
const chatBox = document.getElementById("chatBox");

function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    showTyping();

    fetch("/get", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "msg=" + encodeURIComponent(text)
    })
    .then(res => res.text())
    .then(data => {
        removeTyping();
        addMessage(data, "bot");
    })
    .catch(() => {
        removeTyping();
        addMessage("Server error ⚠️ Try again later.", "bot");
    });
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
    const typing = document.createElement("div");
    typing.id = "typing";
    typing.className = "msg bot";
    typing.innerHTML = "Typing...";
    chatBox.appendChild(typing);
}

function removeTyping() {
    const typing = document.getElementById("typing");
    if (typing) typing.remove();
}

document.getElementById("userInput")
.addEventListener("keypress", function(e){
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
